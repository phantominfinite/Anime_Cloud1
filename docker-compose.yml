version: '3.9'

services:
  backend:
    build:
      context: .
      target: backend
    environment:
      DATABASE_URL: postgresql+asyncpg://anime:animepass@db:5432/anime_db
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./cache:/app/cache
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: .
      target: frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: anime
      POSTGRES_PASSWORD: animepass
      POSTGRES_DB: anime_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anime"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
